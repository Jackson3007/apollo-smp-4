#  All text supports MiniMessage formatting: <gradient>, <color>, <bold>, etc.
#  Docs: https://docs.advntr.dev/minimessage/format.html
# =====================================================================

branding:
  # Shown in chat prefix, menus, and the sidebar title.
  server-name: "Apollo SMP"
  # A short tag used in the chat prefix.
  prefix: "<gradient:#f9d423:#ff4e50><bold>Apollo</bold></gradient> <dark_gray>¬Ľ</dark_gray> "
  # Primary + accent colors reused across menus (MiniMessage color or hex).
  primary: "#f9d423"
  accent: "#ff4e50"
  # Gradient used for big titles.
  title-gradient-from: "#f9d423"
  title-gradient-to: "#ff4e50"

economy:
  # Currency symbol shown before amounts, e.g. $1,250
  symbol: "$"
  # Singular / plural names, used in some messages.
  name-singular: "Dollar"
  name-plural: "Dollars"
  # Starting balance for brand-new players.
  starting-balance: 500.0
  # Max number of decimal places to display (money is stored as a double).
  decimals: 2
  # If false, /pay is disabled.
  allow-pay: true
  # Percentage tax taken on /pay (0 = none). 5 = 5%.
  pay-tax-percent: 0.0

sell:
  # Prices the SERVER pays you per item when using /sell.
  # Material names: https://jd.papermc.io/paper/1.21/org/bukkit/Material.html
  # Anything not listed here cannot be sold to the server.
  prices:
    # Ores / minerals
    COAL: 2.0
    RAW_IRON: 4.0
    RAW_COPPER: 2.5
    RAW_GOLD: 8.0
    IRON_INGOT: 6.0
    GOLD_INGOT: 12.0
    COPPER_INGOT: 3.0
    DIAMOND: 45.0
    EMERALD: 30.0
    LAPIS_LAZULI: 3.0
    REDSTONE: 2.0
    QUARTZ: 2.5
    NETHERITE_SCRAP: 120.0
    ANCIENT_DEBRIS: 150.0
    # Farming
    WHEAT: 1.0
    CARROT: 1.0
    POTATO: 1.0
    BEETROOT: 1.0
    SUGAR_CANE: 1.0
    PUMPKIN: 2.0
    MELON_SLICE: 0.5
    NETHER_WART: 2.0
    # Mob drops
    ROTTEN_FLESH: 0.5
    BONE: 1.0
    STRING: 1.0
    GUNPOWDER: 3.0
    SPIDER_EYE: 1.5
    ENDER_PEARL: 12.0
    BLAZE_ROD: 10.0
    GHAST_TEAR: 25.0
    SLIME_BALL: 3.0
    # Wood
    OAK_LOG: 1.0
    SPRUCE_LOG: 1.0
    BIRCH_LOG: 1.0
    JUNGLE_LOG: 1.0
    ACACIA_LOG: 1.0
    DARK_OAK_LOG: 1.0
    CHERRY_LOG: 1.5
    MANGROVE_LOG: 1.5

auction-house:
  # Max active listings a single player may have at once. 0 = unlimited.
  # Listings are unlimited - there is no per-player cap.
  # How long (in hours) a listing stays up before expiring and being returned.
  listing-duration-hours: 48
  # Percentage fee charged to the SELLER when they list an item (of the sale price).
  listing-tax-percent: 3.0
  # Minimum / maximum price a listing may be set to.
  min-price: 1.0
  max-price: 100000000.0

orders:
  # Max active buy-orders a single player may have at once.
  max-orders-per-player: 5
  # Percentage fee charged to the BUYER when the order is fulfilled.
  fulfil-tax-percent: 3.0
  min-price: 1.0
  max-price: 100000000.0

homes:
  # Home limits per permission rank. The plugin grants the HIGHEST matching value.
  # Give a rank permission like apollo.homes.5 to allow 5 homes.
  default-limit: 3
  # Everyone gets at least this many, whatever default-limit says.
  minimum-limit: 3
  limits:
    "apollo.homes.5": 5
    "apollo.homes.10": 10
    "apollo.homes.unlimited": 9999
  # Seconds to wait before teleporting (movement cancels it). 0 = instant.
  warmup-seconds: 3
  # Cost to teleport home (0 = free).
  teleport-cost: 0.0

rtp:
  # World players are sent to for /rtp and join spawns.
  world: "world"
  # Search radius (blocks from center). Kept inside the border automatically.
  max-radius: 9000
  min-radius: 250
  # Blacklisted surface blocks (won't drop you into these).
  avoid-blocks: [LAVA, WATER, FIRE, CACTUS, MAGMA_BLOCK, POWDER_SNOW]
  # Cooldown between /rtp uses (seconds).
  cooldown-seconds: 30
  # Cost per /rtp (0 = free).
  cost: 0.0
  # Give every brand-new player a random spawn on first join.
  random-spawn-on-first-join: true
  # Teleport EVERY player to the wild each time they join (no fixed spawn).
  # Set to false if you'd rather players log back in where they left off.
  wild-on-join: true

world-border:
  enabled: true
  # World -> border diameter in blocks (centered on 0,0). 20000 = 20k x 20k.
  worlds:
    world: 20000
    world_nether: 2500
    world_the_end: 20000
  # Warning distance (blocks) for the red border effect.
  warning-distance: 32

# The address players connect to. Used by the sidebar %ip%
# placeholder and the welcome message.
server-ip: "apollo.noob.club"

scoreboard:
  enabled: true
  # Title shown at the top of the sidebar.
  title: "<gradient:#f9d423:#ff4e50><bold>APOLLO SMP</bold></gradient>"
  # Refresh rate in server ticks (20 = 1s).
  refresh-ticks: 20
  # Lines top-to-bottom. Placeholders:
  #   %balance% %balance_raw% %player% %online% %world% %homes% %listings% %x% %y% %z%
  #   %skycoins% %businesses% %ip%
  #   %town% (your town)  %town_rank% (your role)  %town_bank%
  #   %town_here% (the land you're standing on)  %playtime%
  lines:
    - "<dark_gray>‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™</dark_gray>"
    - "<gray>Player:</gray> <white>%player%</white>"
    - ""
    - "<#f9d423>Balance</#f9d423>"
    - " <white>%balance%</white>"
    - ""
    - "<#f9d423>Town</#f9d423>"
    - " <white>%town%</white>"
    - " <gray>Role:</gray> <#5ad1e8>%town_rank%</#5ad1e8>"
    - " <gray>Bank:</gray> <#f9d423>%town_bank%</#f9d423>"
    - " <gray>Standing in:</gray> <white>%town_here%</white>"
    - " <gray>Playtime:</gray> <white>%playtime%</white>"
    - "<dark_gray>‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™‚Ė™</dark_gray>"
    - "<#ff4e50>%ip%</#ff4e50>"
    - "<gray>/menu <dark_gray>for everything</dark_gray>"

# Data auto-saves on a timer as a safety net (minutes). Changes also save immediately.
autosave-minutes: 5

# ---- Voting rewards ----
# Players earn Sky Coins (a second currency) for voting. Replace the links below
# with your real vote-site URLs. Doing all 5 in one day pays the all-voted bonus.
voting:
  # Voting is informational only right now - no coins, keys or rewards.
  # Players get a reminder in chat and can grab the links from /vote.
  reminder-enabled: true
  reminder-minutes: 60
  # Up to 4 sites are shown in /vote. Leave the blank ones as they are
  # until you have the real links, and they'll show as "not set".
  services:
    - name: "TopG"
      link: "http://topg.org/minecraft-servers/server-684435#vote"
    - name: "Site 2"
      link: ""
    - name: "Site 3"
      link: ""
    - name: "Site 4"
      link: ""

# ---- Storage vaults ----
# /pv gives staff persistent storage. Contents save on close.
vaults:
  count: 3   # how many vaults each player gets (1-9)
  rows: 6    # rows per vault (1-6)

# ---- Special business auction ----
# One mystery business goes under the hammer each cycle, ending at the
# configured hour. Bids are held in escrow and refunded when outbid.
special-auction:
  enabled: true
  starting-bid: 50000.0
  min-increment: 2500.0
  duration-hours: 24
  end-hour: 12                     # 24-hour clock
  timezone: "America/Los_Angeles"  # noon PST/PDT

# ---- Travelling merchant ----
# Three rare goods, rerolled every day at midnight. Prices are deliberately
# brutal - these are meant to be a long-term money sink.
merchant:
  price-multiplier: 1.0   # scale every price at once
  tool-hours: 48          # how long the drill and feller last
  seed: 7                 # change this to reroll the whole schedule

# ---- Logistics ----
# Distribution blocks gather from nearby businesses; wholesale blocks sell it.
logistics:
  distribution-price: 25000.0
  wholesale-price: 60000.0
  business-radius: 8          # how far a distribution block reaches for businesses
  # Distribution blocks must physically touch the wholesale block, or touch
  # another distribution block that chains back to one.
  sell-interval-minutes: 5
  storage-cap: 4096           # how much a wholesale block holds before it stops pulling
  fee-percent: 8.0            # cut taken off each automated sale

# ---- Businesses ----
invest:
  # Floating text above business blocks showing income and the next payout.
  holograms: true
  # Size of that floating text. 1.0 is vanilla size, lower is smaller.
  hologram-scale: 0.6

# ---- Spawners ----
spawners:
  # Natural spawners still need Silk Touch. Player-placed ones always drop.
  silk-touch-pickup: true
  holograms: true    # floating label showing the mob and stack size
  max-stack: 64      # how many spawners can sit on one block

# ---- Mob stacking ----
# Spawner mobs merge together so spawner rooms stay cheap to run.
# Killing a stacked mob removes one from the stack.
mob-stacking:
  enabled: true
  max-stack: 50
  merge-radius: 6.0

# ---- Discord ----
# A reminder is posted halfway between each vote reminder.
discord:
  enabled: true
  invite: "https://discord.gg/ztg4bkvdpN"

# ---- Sleep ----
# What share of players must be in bed to skip the night.
sleep:
  percentage: 25   # 25 = a quarter of everyone online
  announce: true   # tell the world how many more are needed

# ---- Towns ----
# A Towny-style land system. Costs are money sinks paid by the player;
# plot sales and taxes flow into the town bank.
towns:
  create-cost: 1000.0      # price to found a town (includes the first chunk)
  claim-cost: 500.0        # price per additional chunk
  claims-base: 6           # base chunks a town may hold
  claims-per-member: 4     # extra chunks allowed per resident
  tax-interval-hours: 24   # how often resident taxes are collected into the bank
  # Master switch for /town tp. Each town can also block visitors itself
  # from the town menu, so leave this on unless you want to disable it server-wide.
  public-spawn-teleport: true
  move-cost: 0.0           # price for a mayor to relocate the whole town
  rent-period-hours: 24    # how often plot rent is charged
  upgrade-cost-multiplier: 1.0  # scale every town upgrade price at once
  name-tag: true           # show [Town] above heads and in the tab list
  border-flash-on-enter: true  # briefly outline the claim when you walk into a town
  # Border look. spacing and radius are the performance dials - lower spacing
  # and higher radius mean a lot more particles.
  border:
    default-on: true    # new players see claim borders until they turn them off
    spacing: 1.0        # blocks between particles along an edge (lower = denser)
    height: 2.0         # how tall the wall is, in blocks
    corner-height: 6.0  # taller pillars at chunk corners
    size: 2.0           # particle size (1.0 = vanilla redstone dust)
    radius: 2           # how many chunks around you get drawn (1-6)
